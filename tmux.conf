# general
set -g default-terminal "screen-256color"
set-window-option -g xterm-keys on
#set -g terminal-overrides 'xterm*:XT:smcup@:rmcup@'

# mouse support
set-window-option -g mode-mouse off
set-option -g mouse-resize-pane off
set-option -g mouse-select-pane off
set-option -g mouse-select-window off
# set -g mouse-resize-pane on

# settings
set -g base-index 1
setw -g automatic-rename
set-option -g renumber-windows on
set-window-option -g aggressive-resize off
set -g history-limit 100000
set -sg escape-time 0

# status
set -g status-bg "colour238"
set -g status-left "#[fg=colour236,bg=colour150] #S #[fg=colour150,bg=colour238]"
set -g status-right "#[fg=colour236,bg=colour150] #h "
setw -g window-status-format "#[fg=colour249,bg=colour238] [#I: #[fg=colour249,bg=colour238]#W] "
setw -g window-status-current-format "#[fg=colour150,bg=colour236] [#I: #[fg=colour150,bg=colour236]#W] "

# keybindings
bind-key -n C-Left prev
bind-key -n C-Right next
bind-key -n C-1 select-window -t 1
bind-key -n C-2 select-window -t 2
bind-key -n C-3 select-window -t 3
bind-key -n C-4 select-window -t 4
bind-key -n C-5 select-window -t 5
bind-key -n C-6 select-window -t 6
bind-key -n C-7 select-window -t 7
bind-key -n C-8 select-window -t 8
bind-key -n C-9 select-window -t 9

# bind-key -n C-M-Left swap-window -t -1
# bind-key -n C-M-Right swap-window -t +1

# TMUX plugin manager
set -g @tpm_plugins " \
  tmux-plugins/tpm \
  tmux-plugins/tmux-sensible \
  tmux-plugins/tmux-yank \
  tmux-plugins/tmux-copycat \
"
run-shell "~/.tmux/plugins/tpm/tpm"
