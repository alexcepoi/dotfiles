# general
set -g default-terminal 'screen-256color'
set -g update-environment ''
set -g mouse off

setw -g xterm-keys on
setw -g monitor-activity on

# settings
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string '#S'
setw -g automatic-rename on
setw -g automatic-rename-format "#T"
setw -g aggressive-resize on
set -g display-panes-time 1000

set -g history-limit 100000
set -sg escape-time 0

set -g status-keys emacs
set -g mode-keys vi

# status
set -g status-fg 'colour74'
set -g status-bg 'colour238'
set -g status-left '#[fg=colour236,bg=colour74] #S '
set -g status-right '[#F] #[fg=colour236,bg=colour74] #h '

set -g pane-active-border-style fg=red
set -g pane-border-style fg=default

setw -g window-status-activity-fg 'colour74'
setw -g window-status-activity-bg 'colour238'
setw -g window-status-activity-attr bold

setw -g window-status-separator ' '
setw -g window-status-format ' #I:#[fg=colour249]#W '
setw -g window-status-current-format '#[bg=colour124] #I:#[fg=colour15]#W '

# default keybindings are great!
unbind -a
set -g prefix 'M-\'
bind \ send-prefix

bind : command-prompt
bind ? list-keys
bind d detach
bind D choose-client
bind e showenv -g
bind r attach -d
bind R source-file ~/.tmux.conf \; display-message 'Configuration reloaded.'
bind '~' show-messages

bind -n M-Enter new-window -c '#{pane_current_path}'
bind c new-window
bind w choose-window
bind , command-prompt -I '#W' 'rename-window "%%"'
bind q confirm-before -p 'kill-window #W? (y/n)' kill-window
bind s choose-session
bind n command-prompt 'new-session -As "%%"'

bind -n M-1 select-window -t :0
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

bind -n M-p prev
bind -n M-n next
bind M-p swap-window -t -1
bind M-n swap-window -t +1

bind -n M-[ split-window -h -c '#{pane_current_path}'
bind -n M-] split-window -v -c '#{pane_current_path}'
bind [ select-layout even-horizontal
bind ] select-layout even-vertical
bind { select-layout main-horizontal
bind } select-layout main-vertical
bind = select-layout tiled

bind -n M-` resize-pane -Z
bind ! break-pane
bind C-[ choose-window 'join-pane -dbh -s "%%"'
bind C-] choose-window 'join-pane -dbv -s "%%"'
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind o display-panes
bind O command-prompt -I '#P' 'swap-pane -d -t "%%"'

bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-h select-pane -L
bind -n M-l select-pane -R

bind Up resize-pane -U 5
bind Down resize-pane -D 5
bind Left resize-pane -L 5
bind Right resize-pane -R 5
bind k resize-pane -U 5
bind j resize-pane -D 5
bind h resize-pane -L 5
bind l resize-pane -R 5

# copy-mode quirks
bind -n C-Space copy-mode \; send '0'
bind -n C-PageUp copy-mode -u \; send '0'
bind -n C-PageDown copy-mode \; send PageDown \; send '0'
bind p paste-buffer
bind P choose-buffer

# default vi-copy bindings are great too!
unbind -t vi-copy -a
bind -t vi-copy      h cursor-left
bind -t vi-copy      j cursor-down
bind -t vi-copy      k cursor-up
bind -t vi-copy      l cursor-right
bind -t vi-copy    C-b page-up
bind -t vi-copy    C-f page-down
bind -t vi-copy    C-d halfpage-down
bind -t vi-copy    C-u halfpage-up

bind -t vi-copy     Up cursor-up
bind -t vi-copy   Down cursor-down
bind -t vi-copy   Left cursor-left
bind -t vi-copy  Right cursor-right
bind -t vi-copy  PageDown page-down
bind -t vi-copy  PageUp page-up

bind -t vi-copy      g history-top
bind -t vi-copy      G history-bottom
bind -t vi-copy      w next-word
bind -t vi-copy      b previous-word
bind -t vi-copy      e next-word-end
bind -t vi-copy      W next-space
bind -t vi-copy      B previous-space
bind -t vi-copy      E next-space-end

bind -t vi-copy      0 start-of-line
bind -t vi-copy      ^ back-to-indentation
bind -t vi-copy    '$' end-of-line
bind -t vi-copy      1 start-number-prefix
bind -t vi-copy      2 start-number-prefix
bind -t vi-copy      3 start-number-prefix
bind -t vi-copy      4 start-number-prefix
bind -t vi-copy      5 start-number-prefix
bind -t vi-copy      6 start-number-prefix
bind -t vi-copy      7 start-number-prefix
bind -t vi-copy      8 start-number-prefix
bind -t vi-copy      9 start-number-prefix

bind -t vi-copy      v begin-selection
bind -t vi-copy    C-v rectangle-toggle
bind -t vi-copy Escape cancel
bind -t vi-copy  Enter clear-selection
bind -t vi-copy      q cancel
bind -t vi-copy      y copy-selection
bind -t vi-copy      Y copy-end-of-line

bind -t vi-copy      H top-line
bind -t vi-copy      M middle-line
bind -t vi-copy      L bottom-line

bind -t vi-copy      : goto-line
bind -t vi-copy      / search-backward
bind -t vi-copy      n search-reverse
bind -t vi-copy      N search-again
