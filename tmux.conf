# general
set -g default-terminal "screen-256color"
set-window-option -g xterm-keys on
#set -g terminal-overrides 'xterm*:XT:smcup@:rmcup@'

# mouse support
set-window-option -g mode-mouse off
set-option -g mouse-resize-pane off
set-option -g mouse-select-pane off
set-option -g mouse-select-window off
# set -g mouse-resize-pane on

# settings
set -g base-index 1
setw -g automatic-rename
set-option -g renumber-windows on
set-window-option -g aggressive-resize off
set -g history-limit 100000
set -sg escape-time 0

# status
set -g status-bg "colour238"
set -g status-left "#[fg=colour236,bg=colour150] #S #[fg=colour150,bg=colour238]"
set -g status-right "#[fg=colour236,bg=colour150] #h "
setw -g window-status-format "#[fg=colour249,bg=colour238] [#I: #[fg=colour249,bg=colour238]#W] "
setw -g window-status-current-format "#[fg=colour150,bg=colour236] [#I: #[fg=colour150,bg=colour236]#W] "

# keybindings
bind-key -n M-Left prev
bind-key -n M-Right next
bind-key -n M-1 select-window -t :0
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9

bind-key -n M-S-Left swap-window -t -1
bind-key -n M-S-Right swap-window -t +1

bind-key -n S-Up select-pane -U
bind-key -n S-Down select-pane -D
bind-key -n S-Left select-pane -L
bind-key -n S-Right select-pane -R

bind-key -n M-S-Left swap-pane -U
bind-key -n M-S-Right swap-pane -D

bind-key [ split-window -h
bind-key ] split-window

